name: AutoDev Execute

# Triggered by a repository_dispatch event fired from CRM-Backend's
# AutoDev dispatcher (src/services/autodev/autodevDispatcher.ts).
# Payload carries a pre-generated Claude Code prompt plus the
# development_requests row id for callback state tracking.

on:
  repository_dispatch:
    types: [autodev-execute]

permissions:
  contents: write
  issues: write
  pull-requests: write

jobs:
  execute:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configure git identity
        run: |
          git config user.name "autodev-bot"
          git config user.email "autodev-bot@users.noreply.github.com"

      - name: Create feature branch
        id: branch
        run: |
          BRANCH="autodev/request-${{ github.event.client_payload.request_id }}"
          git checkout -b "$BRANCH"
          echo "branch=$BRANCH" >> "$GITHUB_OUTPUT"

      - name: Run Claude Code with dispatched prompt
        id: claude
        uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          prompt: |
            You are implementing an AutoDev request.

            Request id: ${{ github.event.client_payload.request_id }}
            Title: ${{ github.event.client_payload.title }}
            Priority: ${{ github.event.client_payload.priority }}
            Confidence: ${{ github.event.client_payload.confidence }}

            --- PROMPT START ---
            ${{ github.event.client_payload.prompt }}
            --- PROMPT END ---

            After you have made the changes:
            1. Commit everything with a clear message prefixed "autodev:".
            2. Do NOT push the branch — the workflow will push and open the PR.
            3. In your final response, summarize exactly what you changed.
          claude_args: "--max-turns 15"

      - name: Push branch and open PR
        id: pr
        if: success()
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          git push origin "${{ steps.branch.outputs.branch }}"
          PR_URL=$(gh pr create \
            --title "autodev: ${{ github.event.client_payload.title }}" \
            --body "Automated fix for AutoDev request #${{ github.event.client_payload.request_id }}.

          Priority: ${{ github.event.client_payload.priority }}
          Confidence: ${{ github.event.client_payload.confidence }}

          This PR was automatically generated by AutoDev. Review carefully before merging." \
            --head "${{ steps.branch.outputs.branch }}" \
            --base main)
          echo "pr_url=$PR_URL" >> "$GITHUB_OUTPUT"
          PR_NUMBER=$(echo "$PR_URL" | grep -oE '[0-9]+$')
          echo "pr_number=$PR_NUMBER" >> "$GITHUB_OUTPUT"

      - name: Callback to CRM-Backend
        # Signs the PATCH with SHARED_SERVICE_SECRET using HMAC-SHA256.
        # Must match CRM-Backend/src/utils/hmacAuth.ts verifyRequest():
        #   message   = "<METHOD>\n<PATH>\n<TIMESTAMP>\n<NONCE>\n<BODY_HASH>"
        #   BODY_HASH = sha256 hex of the raw body bytes (or sha256('') if no body)
        #   signature = hex(hmac-sha256(secret, message))
        # Headers:
        #   X-Internal-Service-Auth: HMAC-SHA256 <signature>
        #   X-Request-Timestamp:     <unix-ms>
        #   X-Request-Nonce:         <uuid>
        # Timestamp tolerance is 30s — callback must run promptly.
        if: always()
        env:
          SHARED_SERVICE_SECRET: ${{ secrets.SHARED_SERVICE_SECRET }}
          CALLBACK_URL: ${{ github.event.client_payload.callback_url }}
          REQUEST_ID: ${{ github.event.client_payload.request_id }}
          PR_URL: ${{ steps.pr.outputs.pr_url }}
          PR_NUMBER: ${{ steps.pr.outputs.pr_number }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          RUN_ID: ${{ github.run_id }}
          JOB_STATUS: ${{ job.status }}
        run: |
          set -eu

          if [ "$JOB_STATUS" = "success" ] && [ -n "${PR_URL:-}" ]; then
            STATUS="pr_opened"
          else
            STATUS="failed"
          fi

          if [ -z "${SHARED_SERVICE_SECRET:-}" ] || [ -z "${CALLBACK_URL:-}" ]; then
            echo "Skipping callback: missing SHARED_SERVICE_SECRET or callback_url"
            echo "  request_id: ${REQUEST_ID}"
            echo "  status:     ${STATUS}"
            echo "  pr_url:     ${PR_URL:-<none>}"
            exit 0
          fi

          # Build the JSON body — must be the exact string we sign AND send.
          BODY=$(jq -n -c \
            --arg status "$STATUS" \
            --arg workflowRunId "$RUN_ID" \
            --arg workflowRunUrl "$RUN_URL" \
            --arg pullRequestUrl "${PR_URL:-}" \
            --arg pullRequestNumber "${PR_NUMBER:-}" \
            '{
              status: $status,
              workflowRunId: $workflowRunId,
              workflowRunUrl: $workflowRunUrl
            }
            + (if $pullRequestUrl == "" then {} else {pullRequestUrl: $pullRequestUrl} end)
            + (if $pullRequestNumber == "" then {} else {pullRequestNumber: ($pullRequestNumber | tonumber)} end)')

          # Extract URL path (including query string) from the callback URL.
          URL_PATH=$(printf '%s' "$CALLBACK_URL" | sed -E 's|^https?://[^/]+||')
          if [ -z "$URL_PATH" ]; then
            URL_PATH="/"
          fi

          METHOD="PATCH"
          TIMESTAMP=$(node -e 'process.stdout.write(Date.now().toString())')
          NONCE=$(node -e 'process.stdout.write(require("crypto").randomUUID())')

          # BODY_HASH = sha256 hex of the raw body bytes. Matches hashBody() in
          # CRM-Backend/src/utils/hmacAuth.ts (empty/null/'{}' all hash as sha256('')).
          BODY_HASH=$(printf '%s' "$BODY" | openssl dgst -sha256 -hex | awk '{print $NF}')

          # Signed message — newline-separated, no trailing newline.
          MESSAGE=$(printf '%s\n%s\n%s\n%s\n%s' "$METHOD" "$URL_PATH" "$TIMESTAMP" "$NONCE" "$BODY_HASH")
          SIGNATURE=$(printf '%s' "$MESSAGE" | openssl dgst -sha256 -hmac "$SHARED_SERVICE_SECRET" -hex | awk '{print $NF}')

          echo "AutoDev callback request #${REQUEST_ID}"
          echo "  method:       ${METHOD}"
          echo "  path:         ${URL_PATH}"
          echo "  status:       ${STATUS}"
          echo "  timestamp:    ${TIMESTAMP}"
          echo "  pr_url:       ${PR_URL:-<none>}"

          HTTP_CODE=$(curl -sS -o /tmp/callback-response.txt -w "%{http_code}" \
            -X "$METHOD" "$CALLBACK_URL" \
            -H "Content-Type: application/json" \
            -H "X-Internal-Service-Auth: HMAC-SHA256 ${SIGNATURE}" \
            -H "X-Request-Timestamp: ${TIMESTAMP}" \
            -H "X-Request-Nonce: ${NONCE}" \
            --data-binary "$BODY" || echo "000")

          echo "  http_status:  ${HTTP_CODE}"
          echo "  response:"
          sed 's/^/    /' /tmp/callback-response.txt || true

          # Don't fail the workflow just because the callback failed — the PR
          # is already open and humans can reconcile state manually.
          if [ "$HTTP_CODE" != "200" ] && [ "$HTTP_CODE" != "204" ]; then
            echo "Callback returned non-2xx (${HTTP_CODE}); continuing without failing the workflow."
          fi
